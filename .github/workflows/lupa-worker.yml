name: LUPA Medellín — Ingesta & Scoring Autónomo

on:
  schedule:
    # 03:00 AM COT (Bogotá) = 08:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub para pruebas

jobs:
  run-lupa-engine:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r workers/requirements.txt

      - name: "🐺 Paso 1: Ingesta de Contratos (SECOP II)"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python workers/secop_ingest.py

      - name: "📈 Paso 1.5: Ingesta de Adiciones (Sobrecostos)"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python workers/scoring_engine/adiciones_ingest.py

      - name: "🧠 Paso 2: Motor de Scoring V2 (Riesgo Algorítmico)"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python workers/scoring_engine/scoring_engine.py

      - name: "📢 Paso 3: Resumen Diario Telegram (@LupaMedellin)"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python workers/telegram_dist/main.py
